name: Saki 每月內容豐富化

on:
  schedule:
    # 每月 1 日 01:00 UTC = 日本時間 10:00
    - cron: "0 1 1 * *"
  workflow_dispatch:

# 排程任務只由 GitHub 自己觸發，Codex 可將已查證的內容直接提交回 main。
permissions:
  contents: write

concurrency:
  group: saki-monthly-content-enrichment
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: 設定提交身分
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: 研究並豐富內容
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/prompts/monthly-content-enrichment.md
          working-directory: .
          sandbox: workspace-write
          safety-strategy: drop-sudo
          # 讓代理可用網路搜尋查證，而不是憑記憶補寫。
          codex-args: --search
